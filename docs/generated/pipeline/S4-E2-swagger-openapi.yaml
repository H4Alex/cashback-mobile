openapi: 3.0.3
info:
  title: Cashback API
  description: >
    API RESTful do sistema de cashback multi-tenant.
    Autenticação via JWT Bearer token.
    Paginação offset-based (LengthAwarePaginator).


    **Envelope de resposta**: Todos os endpoints retornam `{status: bool, data: T, error: null|ApiErrorDetail, message: string}`.
    Endpoints paginados usam `pagination` (não `meta+links`): `{status: true, data: T[], pagination: Pagination, error: null, message: string}`.


    **Validação runtime (Zod)**: Consumers usam `apiCall<T>` com `schema.safeParse()` para validação de contrato.
    Schemas Zod referenciados via `x-zod-schema` nas definições.
  version: 1.1.0
  contact:
    name: Cashback API Team

servers:
  - url: http://localhost:8000
    description: Ambiente local

tags:
  - name: Infraestrutura
    description: Health checks, métricas e versão
  - name: Auth
    description: Autenticação web/admin (JWT)
  - name: Auth Mobile
    description: Autenticação mobile (JWT via api_mobile)
  - name: Mobile Consumer
    description: Endpoints exclusivos do consumidor mobile
  - name: Empresas
    description: Listagem de empresas do usuário
  - name: Webhook
    description: Webhooks de integrações externas
  - name: Admin
    description: Painel administrativo (perfil admin)
  - name: Cashback
    description: Geração, utilização e listagem de transações de cashback
  - name: Clientes
    description: CRUD de clientes da empresa
  - name: Campanhas
    description: CRUD de campanhas de cashback
  - name: Configurações
    description: Configurações da empresa
  - name: Unidades
    description: Unidades de negócio
  - name: Usuários
    description: Usuários internos da empresa
  - name: Notificações
    description: Configuração de notificações da empresa
  - name: Faturas
    description: Faturas de assinatura
  - name: Assinaturas
    description: Planos e assinatura da empresa
  - name: Contestações
    description: Contestações de transações
  - name: Auditoria
    description: Log de auditoria
  - name: Relatórios
    description: Relatórios consolidados
  - name: Dashboard
    description: Dados do dashboard do lojista
  - name: LGPD
    description: Endpoints de conformidade LGPD

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT via auth:api (web/admin) ou auth:api_mobile (mobile)"

  responses:
    Unauthenticated:
      description: Não autenticado — token ausente ou inválido
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: boolean
                example: false
              data:
                nullable: true
                example: null
              error:
                $ref: '#/components/schemas/ApiErrorDetail'
              message:
                type: string
                example: Unauthenticated.
    Forbidden:
      description: Acesso negado — perfil sem permissão
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: boolean
                example: false
              data:
                nullable: true
                example: null
              error:
                $ref: '#/components/schemas/ApiErrorDetail'
              message:
                type: string
                example: Acesso negado.
    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: boolean
                example: false
              data:
                nullable: true
                example: null
              error:
                $ref: '#/components/schemas/ApiErrorDetail'
              message:
                type: string
                example: Recurso não encontrado.
    ValidationError:
      description: Erro de validação (422)
      content:
        application/json:
          schema:
            type: object
            x-zod-schema: laravelValidationErrorSchema
            properties:
              status:
                type: boolean
                example: false
              data:
                nullable: true
                example: null
              error:
                $ref: '#/components/schemas/ApiErrorDetail'
              message:
                type: string
                example: Os dados fornecidos são inválidos.
              errors:
                type: object
                additionalProperties:
                  type: array
                  items:
                    type: string

  schemas:
    # ──────────────────────────────────────────
    # ENVELOPE & ERROR SCHEMAS
    # ──────────────────────────────────────────
    ApiErrorDetail:
      type: object
      x-zod-schema: apiErrorDetailSchema
      properties:
        code:
          type: string
        message:
          type: string
        correlation_id:
          type: string
          nullable: true
        details:
          type: object
          nullable: true

    LaravelValidationError:
      type: object
      x-zod-schema: laravelValidationErrorSchema
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    # ──────────────────────────────────────────
    # PAGINATION
    # ──────────────────────────────────────────
    Pagination:
      type: object
      x-zod-schema: paginationMetaSchema
      description: "Paginação offset-based. Substitui o antigo meta+links."
      properties:
        current_page:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        next_page_url:
          type: string
          format: uri
          nullable: true
        prev_page_url:
          type: string
          format: uri
          nullable: true

    CursorPaginationMeta:
      type: object
      x-zod-schema: cursorPaginationMetaSchema
      description: "Paginação cursor-based para endpoints mobile (extrato, historico, notifications)."
      properties:
        next_cursor:
          type: string
          nullable: true
        prev_cursor:
          type: string
          nullable: true
        per_page:
          type: integer
        has_more_pages:
          type: boolean

    PaginationMeta:
      type: object
      deprecated: true
      description: "DEPRECATED — Use Pagination. Mantido para compatibilidade."
      properties:
        current_page:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        from:
          type: integer
        to:
          type: integer

    PaginationLinks:
      type: object
      deprecated: true
      description: "DEPRECATED — Use Pagination. Mantido para compatibilidade."
      properties:
        first:
          type: string
          format: uri
        last:
          type: string
          format: uri
        prev:
          type: string
          format: uri
          nullable: true
        next:
          type: string
          format: uri
          nullable: true

    # ──────────────────────────────────────────
    # RESPONSE SCHEMAS (from resources)
    # ──────────────────────────────────────────
    EmpresaResponse:
      x-zod-schema: empresaSchema
      type: object
      properties:
        id:
          type: integer
        nome_fantasia:
          type: string
        razao_social:
          type: string
        cnpj:
          type: string
        telefone:
          type: string
        email:
          type: string
        cep:
          type: string
        rua:
          type: string
        numero:
          type: string
        complemento:
          type: string
        bairro:
          type: string
        cidade:
          type: string
        estado:
          type: string
        logo_url:
          type: string
        carencia_horas:
          type: integer
        modo_saldo:
          type: string
        percentual_cashback:
          type: number
          format: float
        validade_cashback:
          type: integer
        percentual_max_utilizacao:
          type: number
          format: float
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        assinatura_ativa:
          $ref: '#/components/schemas/AssinaturaResponse'

    TransacaoResponse:
      type: object
      x-zod-schema: transacaoSchema
      properties:
        id:
          type: integer
        empresa_id:
          type: integer
        unidade_negocio_id:
          type: integer
        cliente_id:
          type: integer
        campanha_id:
          type: integer
        operador_id:
          type: integer
        valor_compra:
          type: string
          x-zod-schema: monetarioSchema
          description: "Valor com 2 casas decimais (bcadd). Formato: '10.00'"
        percentual_cashback:
          type: string
          description: Percentual com 2 casas decimais (bcadd)
        valor_cashback:
          type: string
          x-zod-schema: monetarioSchema
          description: "Valor cashback com 2 casas decimais (bcadd). Formato: '10.00'"
        status_venda:
          type: string
          enum: [concluida, cancelada]
        status_cashback:
          type: string
          enum: [pendente, confirmado, utilizado, rejeitado, expirado, congelado, estornado]
          description: "'estornado' adicionado para forward-compatibility (Zod statusCashbackEnum)"
        data_expiracao:
          type: string
          format: date-time
        data_confirmacao:
          type: string
          format: date-time
        transacao_origem_id:
          type: integer
          nullable: true
        dias_restantes_congelamento:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        cliente:
          $ref: '#/components/schemas/ClienteResponse'
        campanha:
          $ref: '#/components/schemas/CampanhaResponse'
        operador:
          $ref: '#/components/schemas/UserResponse'
        unidade_negocio:
          $ref: '#/components/schemas/UnidadeNegocioResponse'
        contestacoes:
          type: array
          items:
            $ref: '#/components/schemas/ContestacaoResponse'

    PlanoResponse:
      type: object
      x-zod-schema: planoSchema
      properties:
        id:
          type: integer
        nome:
          type: string
        slug:
          type: string
        preco_mensal:
          type: number
          format: float
        preco_anual:
          type: number
          format: float
        max_clientes:
          type: integer
          nullable: true
        max_campanhas:
          type: integer
          nullable: true
        max_usuarios:
          type: integer
          nullable: true
        tem_unidades_negocio:
          type: boolean
        nivel_relatorio:
          type: string
          enum: [simples, completos, avancados]
        nivel_suporte:
          type: string
          enum: [email, prioritario, 24_7_gerente]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    FaturaResponse:
      type: object
      x-zod-schema: faturaSchema
      properties:
        id:
          type: integer
        empresa_id:
          type: integer
        assinatura_id:
          type: integer
        valor:
          type: number
          format: float
        status:
          type: string
          enum: [gerada, enviada, paga, vencida]
        starkbank_invoice_id:
          type: string
          nullable: true
        link_pagamento:
          type: string
          nullable: true
        nfe_url:
          type: string
          nullable: true
        data_vencimento:
          type: string
          format: date
        data_pagamento:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        assinatura:
          $ref: '#/components/schemas/AssinaturaResponse'

    AuditoriaResponse:
      type: object
      x-zod-schema: logAuditoriaSchema
      properties:
        id:
          type: integer
        empresa_id:
          type: integer
        usuario_id:
          type: integer
        acao:
          type: string
        entidade:
          type: string
        entidade_id:
          type: integer
        dados_anteriores:
          type: object
          nullable: true
        dados_novos:
          type: object
          nullable: true
        ip_address:
          type: string
        created_at:
          type: string
          format: date-time
        usuario:
          $ref: '#/components/schemas/UserResponse'

    NotificacaoConfigResponse:
      type: object
      x-zod-schema: notificacaoConfigSchema
      description: "Backend retorna formato flat (email:bool, sms:bool, push:bool). Frontend transforma para canal+ativo."
      properties:
        id:
          type: integer
        empresa_id:
          type: integer
        email:
          type: boolean
        sms:
          type: boolean
        push:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    MobileExtratoResponse:
      type: object
      properties:
        id:
          type: integer
        tipo:
          type: string
          description: "Recebido se pendente/confirmado/congelado, Usado se utilizado, senão status_cashback literal"
        valor_compra:
          type: string
          x-zod-schema: monetarioSchema
          description: "Valor monetário com 2 casas decimais. Formato: '10.00'"
        valor_cashback:
          type: string
          x-zod-schema: monetarioSchema
          description: "Valor monetário com 2 casas decimais. Formato: '10.00'"
        status_cashback:
          type: string
          enum: [pendente, confirmado, utilizado, rejeitado, expirado, congelado, estornado]
        data_expiracao:
          type: string
          format: date
        created_at:
          type: string
          format: date-time
        empresa:
          type: object
          properties:
            id:
              type: integer
            nome_fantasia:
              type: string
            logo_url:
              type: string
        campanha:
          type: object
          properties:
            id:
              type: integer
            nome:
              type: string

    AssinaturaResponse:
      type: object
      x-zod-schema: assinaturaSchema
      properties:
        id:
          type: integer
        empresa_id:
          type: integer
        plano_id:
          type: integer
        ciclo:
          type: string
          enum: [mensal, anual]
        status:
          type: string
          enum: [trial, ativa, inadimplente, cancelada]
        em_trial:
          type: boolean
        dias_restantes_trial:
          type: integer
          nullable: true
        data_inicio:
          type: string
          format: date-time
        data_fim_trial:
          type: string
          format: date-time
        data_proxima_cobranca:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        plano:
          $ref: '#/components/schemas/PlanoResponse'
        plano_efetivo:
          $ref: '#/components/schemas/PlanoResponse'

    CampanhaResponse:
      type: object
      x-zod-schema: campanhaSchema
      properties:
        id:
          type: integer
        empresa_id:
          type: integer
        nome:
          type: string
        data_inicio:
          type: string
          format: date-time
        data_fim:
          type: string
          format: date-time
        percentual:
          type: number
          format: float
        validade_padrao:
          type: integer
        status:
          type: string
          enum: [ativa, inativa, finalizada]
          description: "Backend migrou 'encerrada' → 'finalizada'. Zod aceita ambos para backward-compat."
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ClienteResponse:
      type: object
      x-zod-schema: clienteSchema
      properties:
        id:
          type: integer
        cpf:
          type: string
          description: "CPF mascarado: ***.XXX.XXX-**"
        nome:
          type: string
        telefone:
          type: string
        email:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ContestacaoResponse:
      type: object
      x-zod-schema: contestacaoSchema
      properties:
        id:
          type: integer
        empresa_id:
          type: integer
        transacao_id:
          type: integer
        cliente_id:
          type: integer
        tipo:
          type: string
          enum: [cashback_nao_gerado, valor_incorreto, expiracao_indevida, venda_cancelada]
        descricao:
          type: string
        status:
          type: string
          enum: [pendente, aprovada, rejeitada]
        resposta:
          type: string
          nullable: true
        respondido_por:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        transacao:
          $ref: '#/components/schemas/TransacaoResponse'
        cliente:
          $ref: '#/components/schemas/ClienteResponse'
        respondente:
          $ref: '#/components/schemas/UserResponse'

    UnidadeNegocioResponse:
      type: object
      x-zod-schema: unidadeNegocioSchema
      properties:
        id:
          type: integer
        empresa_id:
          type: integer
        nome:
          type: string
        status:
          type: string
          enum: [ativa, inativa]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserResponse:
      type: object
      x-zod-schema: usuarioSchema
      properties:
        id:
          type: integer
        nome:
          type: string
        email:
          type: string
        telefone:
          type: string
        tipo_global:
          type: string
          enum: [admin]
          nullable: true
          description: "'admin' ou null (null = lojista). Backend usa null em vez de 'lojista'."
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        perfil:
          type: string
          enum: [proprietario, gestor, operador, vendedor]
          description: "'proprietario' adicionado conforme backend. Zod inclui 'financeiro' para forward-compat."

    # ──────────────────────────────────────────
    # REQUEST SCHEMAS (from form_requests)
    # ──────────────────────────────────────────
    RegisterRequest:
      type: object
      x-zod-schema: registerRequestSchema
      required: [nome, email, senha, cnpj]
      properties:
        nome:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
        senha:
          type: string
          minLength: 8
          description: Deve atender regra StrongPassword
        telefone:
          type: string
          maxLength: 20
          nullable: true
        cnpj:
          type: string
          description: CNPJ válido (CnpjRule), único em empresas
        nome_fantasia:
          type: string
          maxLength: 255
          nullable: true
        telefone_empresa:
          type: string
          maxLength: 20
          nullable: true

    LoginRequest:
      type: object
      x-zod-schema: loginRequestSchema
      required: [email, senha]
      properties:
        email:
          type: string
          format: email
        senha:
          type: string
        plataforma:
          type: string
          enum: [web, mobile]
          nullable: true

    ForgotPasswordRequest:
      type: object
      x-zod-schema: forgotPasswordRequestSchema
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      x-zod-schema: resetPasswordRequestSchema
      required: [email, token, senha]
      properties:
        email:
          type: string
          format: email
        token:
          type: string
        senha:
          type: string
          minLength: 8
          description: Deve atender regra StrongPassword

    SwitchEmpresaRequest:
      type: object
      x-zod-schema: switchEmpresaRequestSchema
      required: [empresa_id]
      properties:
        empresa_id:
          type: integer
          description: "exists:empresas,id"
        plataforma:
          type: string
          enum: [web, mobile]
          nullable: true

    GerarCashbackRequest:
      type: object
      x-zod-schema: gerarCashbackRequestSchema
      required: [cpf, valor_compra]
      properties:
        cpf:
          type: string
          description: CPF válido (CpfRule)
        valor_compra:
          type: number
          minimum: 0.01
        campanha_id:
          type: integer
          nullable: true
          description: "exists:campanhas,id,empresa_id,{empresa_id}"
        unidade_negocio_id:
          type: integer
          nullable: true
          description: "exists:unidades_negocio,id,empresa_id,{empresa_id}"

    UtilizarCashbackRequest:
      type: object
      x-zod-schema: utilizarCashbackRequestSchema
      required: [cpf, valor_compra]
      properties:
        cpf:
          type: string
          description: CPF válido (CpfRule)
        valor_compra:
          type: number
          minimum: 0.01
        unidade_negocio_id:
          type: integer
          nullable: true
          description: "exists:unidades_negocio,id,empresa_id,{empresa_id}"

    ListTransacoesRequest:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
        sort_by:
          type: string
          maxLength: 50
        order:
          type: string
          enum: [asc, desc]
        data_inicio:
          type: string
          format: date
        data_fim:
          type: string
          format: date
          description: "after_or_equal:data_inicio"
        status_venda:
          type: string
          enum: [concluida, cancelada]
        status_cashback:
          type: string
          enum: [pendente, confirmado, utilizado, rejeitado, expirado, congelado]
        cliente_id:
          type: integer
          minimum: 1
        campanha_id:
          type: integer
          minimum: 1

    CriarClienteRequest:
      type: object
      x-zod-schema: criarClienteRequestSchema
      required: [cpf]
      properties:
        cpf:
          type: string
          description: CPF válido (CpfRule)
        nome:
          type: string
          maxLength: 255
          nullable: true
        telefone:
          type: string
          maxLength: 20
          nullable: true
        email:
          type: string
          format: email
          nullable: true

    AtualizarClienteRequest:
      type: object
      x-zod-schema: atualizarClienteRequestSchema
      properties:
        nome:
          type: string
          maxLength: 255
        telefone:
          type: string
          maxLength: 20
          nullable: true
        email:
          type: string
          format: email
          nullable: true

    CriarCampanhaRequest:
      type: object
      x-zod-schema: criarCampanhaRequestSchema
      required: [nome, data_inicio, data_fim, percentual, validade_padrao]
      properties:
        nome:
          type: string
          maxLength: 255
        data_inicio:
          type: string
          format: date
          description: "after_or_equal:today"
        data_fim:
          type: string
          format: date
          description: "after:data_inicio"
        percentual:
          type: number
          minimum: 0.01
          maximum: 100
        validade_padrao:
          type: integer
          minimum: 1

    AtualizarCampanhaRequest:
      type: object
      x-zod-schema: atualizarCampanhaRequestSchema
      properties:
        nome:
          type: string
          maxLength: 255
        data_inicio:
          type: string
          format: date
        data_fim:
          type: string
          format: date
          description: "after:data_inicio"
        percentual:
          type: number
          minimum: 0.01
          maximum: 100
        validade_padrao:
          type: integer
          minimum: 1
        status:
          type: string
          enum: [ativa, inativa, finalizada]

    AtualizarConfigRequest:
      type: object
      x-zod-schema: atualizarConfigRequestSchema
      properties:
        nome_fantasia:
          type: string
          maxLength: 255
        razao_social:
          type: string
          maxLength: 255
          nullable: true
        telefone:
          type: string
          maxLength: 20
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        cep:
          type: string
          maxLength: 10
          nullable: true
        rua:
          type: string
          maxLength: 255
          nullable: true
        numero:
          type: string
          maxLength: 20
          nullable: true
        complemento:
          type: string
          maxLength: 255
          nullable: true
        bairro:
          type: string
          maxLength: 255
          nullable: true
        cidade:
          type: string
          maxLength: 255
          nullable: true
        estado:
          type: string
          maxLength: 2
          nullable: true
        percentual_cashback:
          type: number
          minimum: 0.01
          maximum: 100
        validade_cashback:
          type: integer
          minimum: 1
        percentual_max_utilizacao:
          type: number
          minimum: 0.01
          maximum: 100
        carencia_horas:
          type: integer
          minimum: 0
          maximum: 8760

    UploadLogoRequest:
      type: object
      required: [logo]
      properties:
        logo:
          type: string
          format: binary
          description: "Imagem (jpg, jpeg, png, webp). Máx 2048 KB."

    AtualizarNotificacaoConfigRequest:
      type: object
      x-zod-schema: notificacaoConfigBackendRequestSchema
      description: "Backend aceita formato flat (email:bool, sms:bool, push:bool)"
      properties:
        email:
          type: boolean
        sms:
          type: boolean
        push:
          type: boolean

    CriarUnidadeRequest:
      type: object
      required: [nome]
      properties:
        nome:
          type: string
          maxLength: 255

    AtualizarUnidadeRequest:
      type: object
      properties:
        nome:
          type: string
          maxLength: 255
        status:
          type: string
          enum: [ativa, inativa]

    CriarUsuarioRequest:
      type: object
      x-zod-schema: criarUsuarioInternoRequestSchema
      required: [nome, email, senha, perfil]
      properties:
        nome:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
        senha:
          type: string
          minLength: 8
          description: Deve atender regra StrongPassword
        telefone:
          type: string
          maxLength: 20
          nullable: true
        perfil:
          type: string
          enum: [proprietario, gestor, operador, vendedor]
        unidade_negocio_ids:
          type: array
          nullable: true
          items:
            type: integer
            description: "exists:unidades_negocio,id"

    AtualizarUsuarioRequest:
      type: object
      x-zod-schema: atualizarUsuarioInternoRequestSchema
      properties:
        nome:
          type: string
          maxLength: 255
        telefone:
          type: string
          maxLength: 20
          nullable: true
        perfil:
          type: string
          enum: [proprietario, gestor, operador, vendedor]
        unidade_negocio_ids:
          type: array
          items:
            type: integer
            description: "exists:unidades_negocio,id"

    CriarContestacaoRequest:
      type: object
      x-zod-schema: criarContestacaoRequestSchema
      required: [transacao_id, tipo, descricao]
      properties:
        transacao_id:
          type: integer
          description: "exists:transacoes,id,empresa_id,{empresa_id}"
        tipo:
          type: string
          enum: [cashback_nao_gerado, valor_incorreto, expiracao_indevida, venda_cancelada]
        descricao:
          type: string
          minLength: 10
          maxLength: 1000

    ListContestacoesRequest:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
        sort_by:
          type: string
          maxLength: 50
        order:
          type: string
          enum: [asc, desc]
        data_inicio:
          type: string
          format: date
        data_fim:
          type: string
          format: date
          description: "after_or_equal:data_inicio"
        status:
          type: string
          enum: [pendente, aprovada, rejeitada]
        tipo:
          type: string
          enum: [cashback_nao_gerado, valor_incorreto, expiracao_indevida, venda_cancelada]

    ResolverContestacaoRequest:
      type: object
      x-zod-schema: resolverContestacaoRequestSchema
      required: [status]
      properties:
        status:
          type: string
          enum: [aprovada, rejeitada]
        resposta:
          type: string
          maxLength: 2000
          nullable: true

    UpgradeRequest:
      type: object
      x-zod-schema: upgradeAssinaturaRequestSchema
      required: [plano_id, ciclo]
      properties:
        plano_id:
          type: integer
          description: "exists:planos,id"
        ciclo:
          type: string
          enum: [mensal, anual]

    ListRequest:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
        sort_by:
          type: string
          maxLength: 50
        order:
          type: string
          enum: [asc, desc]
        data_inicio:
          type: string
          format: date
        data_fim:
          type: string
          format: date
          description: "after_or_equal:data_inicio"

    CriarAdminUsuarioRequest:
      type: object
      required: [nome, email, senha]
      properties:
        nome:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          description: "unique:usuarios,email"
        senha:
          type: string
          minLength: 8
          description: Deve conter maiúscula, minúscula, número e caractere especial
        telefone:
          type: string
          maxLength: 20
          nullable: true

    AtualizarAdminUsuarioRequest:
      type: object
      properties:
        nome:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          description: "unique:usuarios,email,{id}"
        senha:
          type: string
          minLength: 8
          description: Deve conter maiúscula, minúscula, número e caractere especial
        telefone:
          type: string
          maxLength: 20
          nullable: true

    CriarPlanoRequest:
      type: object
      required: [nome, preco_mensal, preco_anual, nivel_relatorio, nivel_suporte]
      properties:
        nome:
          type: string
          maxLength: 100
        preco_mensal:
          type: number
          minimum: 0
        preco_anual:
          type: number
          minimum: 0
        max_clientes:
          type: integer
          minimum: 1
          nullable: true
        max_campanhas:
          type: integer
          minimum: 1
          nullable: true
        max_usuarios:
          type: integer
          minimum: 1
          nullable: true
        tem_unidades_negocio:
          type: boolean
        nivel_relatorio:
          type: string
          enum: [simples, completos, avancados]
        nivel_suporte:
          type: string
          enum: [email, prioritario, 24_7_gerente]

    AtualizarPlanoRequest:
      type: object
      properties:
        nome:
          type: string
          maxLength: 100
        preco_mensal:
          type: number
          minimum: 0
        preco_anual:
          type: number
          minimum: 0
        max_clientes:
          type: integer
          minimum: 1
          nullable: true
        max_campanhas:
          type: integer
          minimum: 1
          nullable: true
        max_usuarios:
          type: integer
          minimum: 1
          nullable: true
        tem_unidades_negocio:
          type: boolean
        nivel_relatorio:
          type: string
          enum: [simples, completos, avancados]
        nivel_suporte:
          type: string
          enum: [email, prioritario, 24_7_gerente]

    AtualizarEmpresaAdminRequest:
      type: object
      properties:
        nome_fantasia:
          type: string
          maxLength: 255
        razao_social:
          type: string
          maxLength: 255
          nullable: true
        telefone:
          type: string
          maxLength: 20
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        percentual_cashback:
          type: number
          minimum: 0.01
          maximum: 100
        validade_cashback:
          type: integer
          minimum: 1
          maximum: 365
        percentual_max_utilizacao:
          type: number
          minimum: 0.01
          maximum: 100
        carencia_horas:
          type: integer
          minimum: 0
          maximum: 720
        modo_saldo:
          type: string
          enum: [individual, global]

    MobileRegisterRequest:
      type: object
      required: [cpf, nome, email, senha]
      properties:
        cpf:
          type: string
          description: CPF válido (CpfRule)
        nome:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
        senha:
          type: string
          minLength: 8
          description: Deve conter maiúscula e número
        telefone:
          type: string
          maxLength: 20
          nullable: true

    MobileLoginRequest:
      type: object
      required: [email, senha]
      properties:
        email:
          type: string
          format: email
        senha:
          type: string

    MobileOAuthRequest:
      type: object
      required: [provider, token]
      properties:
        provider:
          type: string
          enum: [google, apple]
        token:
          type: string
        nome:
          type: string
          maxLength: 255
          nullable: true

    MobileForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          maxLength: 255

    MobileResetPasswordRequest:
      type: object
      required: [email, token, senha]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        token:
          type: string
        senha:
          type: string
          minLength: 8
          description: Deve conter maiúscula e número

    MobileUpdateProfileRequest:
      type: object
      properties:
        nome:
          type: string
          maxLength: 255
        telefone:
          type: string
          maxLength: 20
          nullable: true
        email:
          type: string
          format: email
          maxLength: 255

    MobileDeleteAccountRequest:
      type: object
      required: [senha]
      properties:
        senha:
          type: string
        motivo:
          type: string
          maxLength: 500
          nullable: true

    MobileContestacaoRequest:
      type: object
      required: [transacao_id, tipo, descricao]
      properties:
        transacao_id:
          type: integer
        tipo:
          type: string
          enum: [cashback_nao_gerado, valor_incorreto, expiracao_indevida, venda_cancelada]
        descricao:
          type: string
          minLength: 10
          maxLength: 1000

    MobileQrCodeRequest:
      type: object
      required: [empresa_id, valor]
      properties:
        empresa_id:
          type: integer
          description: "exists:empresas,id"
        valor:
          type: number
          minimum: 0.01

    MobileRegisterDeviceRequest:
      type: object
      required: [token, plataforma]
      properties:
        token:
          type: string
          maxLength: 500
        plataforma:
          type: string
          enum: [ios, android]

    MobileDestroyDeviceRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string

    # ──────────────────────────────────────────
    # NEW REQUEST/RESPONSE SCHEMAS (S4)
    # ──────────────────────────────────────────
    VerifyResetTokenRequest:
      type: object
      required: [email, token]
      properties:
        email:
          type: string
          format: email
        token:
          type: string
      description: "Verifica se o token de redefinição de senha é válido (novo em S2-E5 C3)"

    VerifyResetTokenResponse:
      type: object
      properties:
        valid:
          type: boolean
        expires_in:
          type: integer
          description: "Tempo restante em segundos até expiração do token"

    BiometricUnenrollRequest:
      type: object
      required: [device_id]
      properties:
        device_id:
          type: string
          maxLength: 255
      description: "Remove cadastro biométrico do dispositivo (novo em S2-E5 C1)"

    BiometricUnenrollResponse:
      type: object
      properties:
        unenrolled:
          type: boolean

    MobileChangePasswordRequest:
      type: object
      required: [senha_atual, nova_senha, nova_senha_confirmation]
      properties:
        senha_atual:
          type: string
        nova_senha:
          type: string
          minLength: 8
          description: Deve conter maiúscula e número
        nova_senha_confirmation:
          type: string
          description: "Deve ser igual a nova_senha (adicionado em S3)"

# ══════════════════════════════════════════════════════════════
# PATHS
# ══════════════════════════════════════════════════════════════
paths:
  # ──────────────────────────────────────────
  # INFRAESTRUTURA
  # ──────────────────────────────────────────
  /api/health:
    get:
      tags: [Infraestrutura]
      summary: Health check
      description: Verifica se a aplicação está respondendo
      operationId: health
      security: []
      responses:
        '200':
          description: Aplicação saudável
          content:
            application/json:
              schema:
                type: object

  /api/ready:
    get:
      tags: [Infraestrutura]
      summary: Readiness check
      description: Verifica se a aplicação está pronta para receber requisições
      operationId: ready
      security: []
      responses:
        '200':
          description: Aplicação pronta
          content:
            application/json:
              schema:
                type: object

  /api/version:
    get:
      tags: [Infraestrutura]
      summary: Versão da aplicação
      description: Retorna a versão atual da aplicação
      operationId: version
      security: []
      responses:
        '200':
          description: Versão retornada com sucesso
          content:
            application/json:
              schema:
                type: object

  /api/metrics:
    get:
      tags: [Infraestrutura]
      summary: Métricas da aplicação
      description: Retorna métricas internas (apenas admin)
      operationId: metrics
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Métricas retornadas com sucesso
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/metrics/prometheus:
    get:
      tags: [Infraestrutura]
      summary: Métricas Prometheus
      description: Endpoint de scraping para Prometheus (InternalOnly)
      operationId: metricsPrometheus
      security: []
      responses:
        '200':
          description: Métricas no formato Prometheus
          content:
            text/plain:
              schema:
                type: string

  # ──────────────────────────────────────────
  # AUTH WEB/ADMIN
  # ──────────────────────────────────────────
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Registro de nova empresa
      description: Registra um novo usuário e empresa no sistema
      operationId: authRegister
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Usuário e empresa criados com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: Autentica o usuário e retorna token JWT. Resposta no envelope padrão.
      operationId: authLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        description: "JWT token (anteriormente 'access_token')"
                      token_type:
                        type: string
                        example: bearer
                  error:
                    nullable: true
                    example: null
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Recuperar senha
      description: Envia e-mail de recuperação de senha
      operationId: authForgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: E-mail de recuperação enviado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/auth/reset-password:
    post:
      tags: [Auth]
      summary: Redefinir senha
      description: Redefine a senha do usuário com token de recuperação
      operationId: authResetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Senha redefinida com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/auth/verify-reset-token:
    post:
      tags: [Auth]
      summary: Verificar token de redefinição de senha
      description: Verifica se o token de redefinição de senha é válido e não expirou (novo em S2-E5 C3)
      operationId: authVerifyResetToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyResetTokenRequest'
      responses:
        '200':
          description: Token válido
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/VerifyResetTokenResponse'
                  error:
                    nullable: true
                    example: null
                  message:
                    type: string
        '400':
          description: Token inválido
        '410':
          description: Token expirado
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/auth/switch-empresa:
    post:
      tags: [Auth]
      summary: Trocar empresa ativa
      description: Altera a empresa ativa do usuário (multi-loja)
      operationId: authSwitchEmpresa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SwitchEmpresaRequest'
      responses:
        '200':
          description: Empresa alterada com sucesso
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Renovar token
      description: Renova o token JWT atual. Resposta no envelope padrão.
      operationId: authRefresh
      responses:
        '200':
          description: Token renovado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        description: "JWT token (anteriormente 'access_token')"
                      token_type:
                        type: string
                        example: bearer
                  error:
                    nullable: true
                    example: null
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthenticated'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: Invalida o token JWT atual
      operationId: authLogout
      responses:
        '200':
          description: Logout realizado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthenticated'

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Dados do usuário autenticado
      description: Retorna os dados do usuário logado
      operationId: authMe
      responses:
        '200':
          description: Dados do usuário
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'

  /api/v1/auth/2fa/setup:
    post:
      tags: [Auth]
      summary: Configurar 2FA
      description: Inicia a configuração da autenticação em dois fatores
      operationId: auth2faSetup
      responses:
        '200':
          description: QR code e secret retornados
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthenticated'

  /api/v1/auth/2fa/confirm:
    post:
      tags: [Auth]
      summary: Confirmar 2FA
      description: Confirma a ativação do 2FA com código TOTP
      operationId: auth2faConfirm
      responses:
        '200':
          description: 2FA ativado com sucesso
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthenticated'

  /api/v1/auth/2fa/verify:
    post:
      tags: [Auth]
      summary: Verificar código 2FA
      description: Verifica o código TOTP durante o login
      operationId: auth2faVerify
      responses:
        '200':
          description: Código verificado com sucesso
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthenticated'

  /api/v1/auth/2fa/disable:
    post:
      tags: [Auth]
      summary: Desativar 2FA
      description: Desativa a autenticação em dois fatores
      operationId: auth2faDisable
      responses:
        '200':
          description: 2FA desativado com sucesso
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthenticated'

  /api/v1/auth/2fa/backup-codes:
    post:
      tags: [Auth]
      summary: Gerar códigos de backup 2FA
      description: Gera novos códigos de backup para o 2FA
      operationId: auth2faBackupCodes
      responses:
        '200':
          description: Códigos de backup gerados
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthenticated'

  # ──────────────────────────────────────────
  # AUTH MOBILE
  # ──────────────────────────────────────────
  /api/mobile/v1/auth/register:
    post:
      tags: [Auth Mobile]
      summary: Registro de consumidor mobile
      description: Registra um novo consumidor no aplicativo mobile
      operationId: mobileAuthRegister
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileRegisterRequest'
      responses:
        '201':
          description: Consumidor registrado com sucesso
          content:
            application/json:
              schema:
                type: object
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/mobile/v1/auth/login:
    post:
      tags: [Auth Mobile]
      summary: Login mobile
      description: Autentica o consumidor mobile e retorna token JWT. Resposta no envelope padrão.
      operationId: mobileAuthLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileLoginRequest'
      responses:
        '200':
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        description: "JWT token (anteriormente 'access_token')"
                      token_type:
                        type: string
                        example: bearer
                  error:
                    nullable: true
                    example: null
                  message:
