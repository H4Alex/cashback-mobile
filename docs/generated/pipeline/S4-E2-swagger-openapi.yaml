  # ──────────────────────────────────────────
  # CONTESTAÇÕES
  # ──────────────────────────────────────────
  /api/v1/contestacoes:
    get:
      tags: [Contestações]
      summary: Listar contestações
      description: Retorna as contestações da empresa com filtros e paginação
      operationId: contestacoesList
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          schema:
            type: string
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: data_inicio
          in: query
          schema:
            type: string
            format: date
        - name: data_fim
          in: query
          schema:
            type: string
            format: date
        - name: status
          in: query
          schema:
            type: string
            enum: [pendente, aprovada, rejeitada]
        - name: tipo
          in: query
          schema:
            type: string
            enum: [cashback_nao_gerado, valor_incorreto, expiracao_indevida, venda_cancelada]
      responses:
        '200':
          description: Lista de contestações
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContestacaoResponse'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                  error:
                    nullable: true
                    example: null
                  message:
                    type: string
                  status:
                    type: boolean
                    example: true
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Contestações]
      summary: Criar contestação
      description: Cria uma nova contestação de transação (lojista)
      operationId: contestacaoStore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CriarContestacaoRequest'
      responses:
        '201':
          description: Contestação criada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ContestacaoResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/contestacoes/{id}:
    patch:
      tags: [Contestações]
      summary: Resolver contestação
      description: Aprova ou rejeita uma contestação
      operationId: contestacaoResolve
      parameters:
